{% set name = "kagglehub" %}
{% set version = "0.3.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d3c8b6250627d665096cd91a9487559bf5ed61be607eaf63d14511b20eea646e

build:
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  number: 0
  skip: true  # [py<39]

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - requests
    - tqdm
    - packaging
    - pyyaml
  run_constrained:
    - sigstore >=3.6.1
    - betterproto >=2.0.0b6

# Missed modules: jwt, model_signing, fastexcel
{% set ignored_tests = [
  "--ignore=tests/test_kaggle_token_auth.py",
  "--ignore=tests/test_model_upload.py",
  "--ignore=tests/test_dataset_load.py"
]%}
test:
  source_files:
    - tests
    - pyproject.toml
  imports:
    - kagglehub
  commands:
    - pip check
    - pytest -v  {{ ignored_tests | join(" ")}}
  requires:
    - pip
    - pytest
    - flask
    - polars

about:
  home: https://github.com/Kaggle/kagglehub
  description: |
    KaggleHub is a Python package that provides a simple API to access Kaggle resources anywhere.
  summary: Access Kaggle resources anywhere
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  dev_url: https://github.com/Kaggle/kagglehub
  doc_url: https://github.com/Kaggle/kagglehub/blob/main/README.md

extra:
  recipe-maintainers:
    - ngam
